name: 🐍 Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"   # executa a cada 12 horas

  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=yellow&color_dots=#00b4d8,#0077b6,#023e8a,#48cae4&color_empty=#1a1a2e&color_filled=#0d3b66
            dist/github-snake-dark.svg?color_snake=yellow&color_dots=#ffbe0b,#fb5607,#ff006e,#8338ec&color_empty=#0d1117&color_filled=#161b22

      - name: Push Snake Animation
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
