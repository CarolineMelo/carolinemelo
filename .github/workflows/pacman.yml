name: 🟡 Pac-Man contribution graph

on:
  schedule:
    - cron: "0 */12 * * *"   # roda a cada 12 horas
  workflow_dispatch:           
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Pac-Man SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/pacman.svg?color_snake=yellow&color_dots=#00b4d8,#0077b6,#023e8a,#48cae4&color_empty=#1a1a2e&color_filled=#0d3b66
            dist/pacman-dark.svg?color_snake=yellow&color_dots=#ffbe0b,#fb5607,#ff006e,#8338ec&color_empty=#0d1117&color_filled=#161b22

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
